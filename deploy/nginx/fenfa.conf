# Nginx site config for Fenfa (Docker)
# Replace `fenfa.example.com` and `dl.example.com` with your real domains
# If Nginx runs on the host, use upstream 127.0.0.1:8000; if in Docker, use service name `fenfa:8000`.

# Upstream to Fenfa container
upstream fenfa_backend {
    # Docker-to-Docker (same user-defined network):
    server fenfa:8000;
    # Host Nginx to container mapped port:
    # server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP -> HTTPS redirect (optional; keep HTTP-only by removing this server block)
server {
    listen 80;
    listen [::]:80;
    server_name fenfa.example.com dl.example.com;  # primary_domain + secondary_domains
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fenfa.example.com dl.example.com;  # primary_domain + secondary_domains

    # TLS certs (Let's Encrypt example)
    ssl_certificate     /etc/letsencrypt/live/fenfa.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fenfa.example.com/privkey.pem;
    ssl_session_timeout 10m;
    ssl_session_cache   shared:SSL:10m;

    # Upload/download tuning
    client_max_body_size 2g;
    client_body_timeout  10m;
    send_timeout         10m;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    # Basic gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # Proxy all traffic to backend
    location / {
        proxy_pass http://fenfa_backend;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_http_version 1.1;

        # Stream large uploads directly to upstream instead of buffering to disk
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_max_temp_file_size 0;
    }

    # Health check (no access log)
    location = /healthz {
        access_log off;
        proxy_pass http://fenfa_backend/healthz;
    }
}

