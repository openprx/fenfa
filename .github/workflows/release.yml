name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build frontend
        run: |
          cd web/front && npm ci && npm run build && cd ../..
          cd web/admin && npm ci && npm run build && cd ../..

      - name: Install cross-compilation dependencies
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o fenfa-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server

      - name: Compress binary
        run: |
          tar czf fenfa-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            fenfa-${{ matrix.goos }}-${{ matrix.goarch }}

      - uses: actions/upload-artifact@v4
        with:
          name: fenfa-${{ matrix.goos }}-${{ matrix.goarch }}
          path: fenfa-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            fenfa-*.tar.gz
