name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GOPRIVATE: github.com/openprx/*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install SQLite headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build frontend
        run: |
          cd web/front && npm ci && npm run build && cd ../..
          cd web/admin && npm ci && npm run build && cd ../..

      - name: Build binary (linux/amd64)
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o fenfa-linux-amd64 ./cmd/server
          tar czf fenfa-linux-amd64.tar.gz fenfa-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: fenfa-linux-amd64.tar.gz
